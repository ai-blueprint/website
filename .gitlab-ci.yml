variables:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "http.version"
  GIT_CONFIG_VALUE_0: "HTTP/1.1"
  GIT_SSL_NO_VERIFY: "true"

stages: [build, deploy]

build-job:
  stage: build
  tags: [windows]
  script:
    - yarn install
    - yarn build
    # 修正：检查构建目录并重命名为 website，确保后续脚本能找到
    - if (Test-Path build) { Rename-Item build website }
    - if (Test-Path dist) { Rename-Item dist website }
    # 如果你的构建目录本身就是 website，上面两行会自动跳过或报错(可忽略)，关键是确保目录下有 website 文件夹
  artifacts:
    paths: [website/]
    expire_in: 1 hour

deploy-job:
  stage: deploy
  tags: [windows]
  before_script:
    - |
      if (-not $env:FTP_HOST -or -not $env:FTP_USER -or -not $env:FTP_PASS) {
        Write-Error "Missing required FTP environment variables"
        exit 1
      }
  script:
    - |
      # === 1. 配置 ===
      $cred = New-Object Net.NetworkCredential($env:FTP_USER, $env:FTP_PASS)
      
      # 确保 host 末尾没有 /，确保 base path 格式正确
      $hostUrl = $env:FTP_HOST.TrimEnd('/')
      # 请根据实际情况调整下面的路径，例如 "ftp://$hostUrl/www/wwwroot/aib"
      $baseUri = "ftp://$hostUrl/www/wwwroot/aib" 
      
      $tempDirName = "website_temp"
      $targetDirName = "website"
      $backupDirName = "website_bak"
      $localDistPath = (Get-Item "website").FullName

      # 辅助函数
      function Send-FtpRequest {
          param($Uri, $Method, $RenameTo=$null, $IsUpload=$false, $FilePath=$null)
          try {
              $r = [Net.FtpWebRequest]::Create($Uri)
              $r.Method = $Method
              $r.Credentials = $cred
              $r.UsePassive = $true
              $r.KeepAlive = $false
              $r.UseBinary = $true # 强制二进制，防止文件损坏
              
              if ($RenameTo) { $r.RenameTo = $RenameTo }
              
              if ($IsUpload -and $FilePath) {
                  $bytes = [IO.File]::ReadAllBytes($FilePath)
                  $r.ContentLength = $bytes.Length
                  $s = $r.GetRequestStream()
                  $s.Write($bytes, 0, $bytes.Length)
                  $s.Close()
              }
              
              $resp = $r.GetResponse()
              $resp.Close()
              return $true
          } catch {
              # 捕获 550 错误 (文件不可用/已存在)
              $ex = $_.Exception
              while ($ex.InnerException) { $ex = $ex.InnerException }
              $respObj = $ex.Response
              if ($respObj -and $respObj.StatusCode -eq [Net.FtpStatusCode]::ActionNotTakenFileUnavailable) {
                  $respObj.Close()
                  return "Ignored550"
              }
              if ($respObj) { $respObj.Close() }
              throw $_
          }
      }

      Write-Host "Deploying to $baseUri"

      # === 2. 清理 & 初始化临时目录 ===
      Write-Host "Resetting temp directory..."
      # 尝试删除旧 temp (如果存在)
      $null = Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::RemoveDirectory)
      # 创建新 temp
      $res = Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::MakeDirectory)
      if ($res -eq "Ignored550") { Write-Warning "Temp dir already exists, proceeding..." }

      # === 3. 第一步：先创建所有文件夹结构 (关键修复) ===
      Write-Host "Phase 1: Creating directory structure..."
      $directories = Get-ChildItem -Path $localDistPath -Recurse -Directory | Sort-Object { $_.FullName.Length }
      
      foreach ($dir in $directories) {
          # 计算相对路径，例如 /assets/img
          $relativePath = $dir.FullName.Substring($localDistPath.Length).Replace('\', '/').Trim('/')
          if ([string]::IsNullOrWhiteSpace($relativePath)) { continue }
          
          $remoteUri = "$baseUri/$tempDirName/$relativePath"
          
          try {
              $res = Send-FtpRequest -Uri $remoteUri -Method ([Net.WebRequestMethods+Ftp]::MakeDirectory)
              if ($res -ne "Ignored550") { Write-Host "Created Dir: $relativePath" }
          } catch {
              Write-Error "Failed to create directory $relativePath. Stopping."
              exit 1
          }
      }

      # === 4. 第二步：上传所有文件 ===
      Write-Host "Phase 2: Uploading files..."
      $files = Get-ChildItem -Path $localDistPath -Recurse -File | Where-Object { $_.Extension -ne ".map" }
      
      foreach ($file in $files) {
          $relativePath = $file.FullName.Substring($localDistPath.Length).Replace('\', '/').Trim('/')
          $remoteUri = "$baseUri/$tempDirName/$relativePath"
          
          try {
              Send-FtpRequest -Uri $remoteUri -Method ([Net.WebRequestMethods+Ftp]::UploadFile) -IsUpload $true -FilePath $file.FullName | Out-Null
              Write-Host "Uploaded: $relativePath"
          } catch {
              Write-Error "Failed to upload $relativePath : $_"
              exit 1
          }
      }

      # === 5. 切换目录 (上线) ===
      Write-Host "Phase 3: Going Live..."
      
      # 删除旧备份
      $null = Send-FtpRequest -Uri "$baseUri/$backupDirName" -Method ([Net.WebRequestMethods+Ftp]::RemoveDirectory)
      
      # 备份当前网站
      $null = Send-FtpRequest -Uri "$baseUri/$targetDirName" -Method ([Net.WebRequestMethods+Ftp]::Rename) -RenameTo $backupDirName
      
      # 启用新网站
      try {
          Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::Rename) -RenameTo $targetDirName | Out-Null
          Write-Host "SUCCESS: Deployment complete."
      } catch {
          Write-Error "FATAL: Failed to rename temp directory to live. Check server."
          exit 1
      }