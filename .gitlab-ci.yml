variables:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "http.version"
  GIT_CONFIG_VALUE_0: "HTTP/1.1"
  GIT_SSL_NO_VERIFY: "true"

stages: [build, deploy]

build-job:
  stage: build
  tags: [windows]
  script:
    - yarn install
    - yarn build
    # 修正：检查构建目录并重命名为 website，确保后续脚本能找到
    - if (Test-Path build) { Rename-Item build website }
    - if (Test-Path dist) { Rename-Item dist website }
    # 如果你的构建目录本身就是 website，上面两行会自动跳过或报错(可忽略)，关键是确保目录下有 website 文件夹
  artifacts:
    paths: [website/]
    expire_in: 1 hour

deploy-job:
  stage: deploy
  tags: [windows]
  before_script:
    - |
      if (-not $env:FTP_HOST -or -not $env:FTP_USER -or -not $env:FTP_PASS) {
        Write-Error "Missing required FTP environment variables"
        exit 1
      }
  script:
    - |
      # === 配置部分 ===
      $cred = New-Object Net.NetworkCredential($env:FTP_USER, $env:FTP_PASS)
      
      # 注意：如果你的 FTP 用户登录进去直接就是 /www/wwwroot/aib，请把下面改成 ftp://$($env:FTP_HOST)
      $baseUri = "ftp://$($env:FTP_HOST)/www/wwwroot/aib" 
      
      $tempDirName = "website_temp"
      $targetDirName = "website"
      $backupDirName = "website_bak" # 简单的备份名，覆盖式备份

      # === 核心函数：发送 FTP 请求 (带重试和资源释放) ===
      function Send-FtpRequest {
          param($Uri, $Method, $RenameTo=$null, $IgnoreError550=$false)
          try {
              $r = [Net.FtpWebRequest]::Create($Uri)
              $r.Method = $Method
              $r.Credentials = $cred
              $r.UsePassive = $true
              $r.KeepAlive = $false
              if ($RenameTo) { $r.RenameTo = $RenameTo }
              $resp = $r.GetResponse()
              $resp.Close() # 关键：立即释放连接
              return $true
          } catch {
              $ex = $_.Exception
              if ($ex.InnerException) { $ex = $ex.InnerException }
              $respObj = $ex.Response
              
              # 处理 550 错误 (文件/目录不存在 或 已存在)
              if ($respObj -and $respObj.StatusCode -eq [Net.FtpStatusCode]::ActionNotTakenFileUnavailable) { # Code 550
                  if ($respObj) { $respObj.Close() }
                  if ($IgnoreError550) { 
                      Write-Warning "Ignored 550 error for $Uri (Target might not exist or already exists)"
                      return $false 
                  }
              }
              if ($respObj) { $respObj.Close() }
              throw $_
          }
      }

      Write-Host "Starting deployment..."

      # 1. 【关键修复】清理上次失败遗留的 temp 目录
      Write-Host "Cleaning up leftover temp directory..."
      try {
          # 尝试删除目录 (如果是文件用 DeleteFile，目录用 RemoveDirectory)
          # 这里先假设它是目录。如果之前上传了一半，递归删除很难，这里尝试直接改名移走或删除
          # 最稳妥的方式：尝试重命名为一个垃圾目录以后手动清，或者尝试 RemoveDirectory
          Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::RemoveDirectory) -IgnoreError550 $true
          Write-Host "Cleanup done (or dir didn't exist)."
      } catch {
          Write-Warning "Could not remove temp dir (it might contain files or not exist). Trying to proceed..."
      }

      # 2. 创建临时目录 (容错：如果已存在，则忽略错误继续)
      Write-Host "Creating temp directory..."
      try {
          Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::MakeDirectory)
      } catch {
          # 如果创建失败，可能是目录已存在(且非空导致没删掉)，这里假设它存在并继续
          Write-Warning "MakeDirectory failed (Error 550 usually means it already exists). Proceeding..."
      }

      # 3. 上传文件
      $localRoot = (Get-Item "website").FullName
      # 排序：先长后短是错的，应该是先短后长(先创建根目录)，但 Get-ChildItem 默认顺序通常可以
      # 显式按路径长度排序，确保父目录先被处理
      $items = Get-ChildItem "website" -Recurse | Where-Object { $_.Extension -ne ".map" } | Sort-Object { $_.FullName.Length }

      foreach ($item in $items) {
          $relativePath = $item.FullName.Substring($localRoot.Length).Replace('\', '/').Trim('/')
          $remoteUri = "$baseUri/$tempDirName/$relativePath"
          
          if ($item.PSIsContainer) {
              # 创建子目录，忽略 "已存在" 错误
              Send-FtpRequest -Uri $remoteUri -Method ([Net.WebRequestMethods+Ftp]::MakeDirectory) -IgnoreError550 $true | Out-Null
          } else {
              if ($item.Length -eq 0) { continue }
              # 上传文件
              try {
                  $r = [Net.FtpWebRequest]::Create($remoteUri)
                  $r.Method = [Net.WebRequestMethods+Ftp]::UploadFile
                  $r.Credentials = $cred
                  $r.UsePassive = $true
                  $r.KeepAlive = $false
                  $bytes = [IO.File]::ReadAllBytes($item.FullName)
                  $r.ContentLength = $bytes.Length
                  $s = $r.GetRequestStream()
                  $s.Write($bytes, 0, $bytes.Length)
                  $s.Close()
                  $resp = $r.GetResponse()
                  $resp.Close()
                  Write-Host "Uploaded: $relativePath"
              } catch {
                  Write-Error "Failed to upload $relativePath : $_"
                  exit 1
              }
          }
      }

      # 4. 原子性切换
      Write-Host "Swapping directories..."

      # 4.1 删除旧的备份 (如果存在)
      Send-FtpRequest -Uri "$baseUri/$backupDirName" -Method ([Net.WebRequestMethods+Ftp]::RemoveDirectory) -IgnoreError550 $true

      # 4.2 把现有的 website 改名为 backup (如果存在)
      # 如果 website 不存在(第一次部署)，这一步会报 550，我们需要忽略
      try {
          Send-FtpRequest -Uri "$baseUri/$targetDirName" -Method ([Net.WebRequestMethods+Ftp]::Rename) -RenameTo $backupDirName
          Write-Host "Backed up current website."
      } catch {
           Write-Warning "Could not backup current website (maybe it doesn't exist yet). Error: $_"
      }

      # 4.3 把 temp 改名为 website
      try {
          Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::Rename) -RenameTo $targetDirName
          Write-Host "Deployment Successful!"
      } catch {
          Write-Error "Critical Error: Failed to activate new website. Please check server. $_"
          exit 1
      }