stages:
  - install
  - build
  - deploy

variables:
  NODE_VERSION: '18.17.0'
  DEPLOY_PATH: '/www/wwwroot/aib/website'

install_dependencies:
  stage: install
  tags:
    - windows
  script:
    - yarn install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day

build_project:
  stage: build
  tags:
    - windows
  dependencies:
    - install_dependencies
  script:
    - yarn build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

deploy_to_server:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build_project
  script:
    - Write-Output "开始部署到服务器..."
    # 使用 pscp 上传 dist 目录内容到服务器
    - 'pscp.exe -batch -pw "$env:PASSWORD" -r dist\* "$env:USER@$env:HOST:$env:DEPLOY_PATH"'
    - Write-Output "部署完成!"