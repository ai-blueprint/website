variables:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "http.version"
  GIT_CONFIG_VALUE_0: "HTTP/1.1"
  GIT_SSL_NO_VERIFY: "true"

stages: [build, deploy]

build-job:
  stage: build
  tags: [windows]
  script:
    - yarn install
    - yarn build
    # 修正：检查构建目录并重命名为 website，确保后续脚本能找到
    - if (Test-Path build) { Rename-Item build website }
    - if (Test-Path dist) { Rename-Item dist website }
    # 如果你的构建目录本身就是 website，上面两行会自动跳过或报错(可忽略)，关键是确保目录下有 website 文件夹
  artifacts:
    paths: [website/]
    expire_in: 1 hour

deploy-job:
  stage: deploy
  tags: [windows]
  before_script:
    - |
      if (-not $env:FTP_HOST -or -not $env:FTP_USER -or -not $env:FTP_PASS) {
        Write-Error "Missing required FTP environment variables"
        exit 1
      }
  script:
    - |
      # === 1. 配置与变量 ===
      $cred = New-Object Net.NetworkCredential($env:FTP_USER, $env:FTP_PASS)
      
      # 确保 host 干净
      $hostUrl = $env:FTP_HOST.TrimEnd('/')
      # ！！！重要！！！：请确认这个路径是否正确
      # 如果你的 FTP 进门就是根目录，路径可能是 "/aib" 而不是 "/www/wwwroot/aib"
      $basePath = "/www/wwwroot/aib" 
      $baseUri = "ftp://$hostUrl$basePath"
      
      $tempDirName = "website_temp"
      $targetDirName = "website"
      $backupDirName = "website_bak"
      $localDistPath = (Get-Item "website").FullName

      Write-Host "=========================================="
      Write-Host "Target URL: $baseUri"
      Write-Host "=========================================="

      # === 2. 核心函数 ===
      function Send-FtpRequest {
          param($Uri, $Method, $RenameTo=$null, $IsUpload=$false, $FilePath=$null)
          try {
              $r = [Net.FtpWebRequest]::Create($Uri)
              $r.Method = $Method
              $r.Credentials = $cred
              $r.UsePassive = $true
              $r.KeepAlive = $false
              $r.UseBinary = $true 
              if ($RenameTo) { $r.RenameTo = $RenameTo }
              
              if ($IsUpload) {
                  $bytes = [IO.File]::ReadAllBytes($FilePath)
                  $r.ContentLength = $bytes.Length
                  $s = $r.GetRequestStream()
                  $s.Write($bytes, 0, $bytes.Length)
                  $s.Close()
              }
              
              $resp = $r.GetResponse()
              $resp.Close()
              return $true
          } catch {
              throw $_
          }
      }

      # 智能目录创建函数 (修复 550/553 问题的核心)
      function Ensure-Directory {
          param($DirUri)
          try {
              Write-Host "Creating Dir: $DirUri"
              Send-FtpRequest -Uri $DirUri -Method ([Net.WebRequestMethods+Ftp]::MakeDirectory) | Out-Null
              Write-Host " -> Created."
          } catch {
              $ex = $_.Exception
              while ($ex.InnerException) { $ex = $ex.InnerException }
              $resp = $ex.Response
              
              # 如果是 550，我们需要验证到底是因为"已存在"还是"路径错误"
              if ($resp.StatusCode -eq [Net.FtpStatusCode]::ActionNotTakenFileUnavailable) {
                  $resp.Close()
                  Write-Host " -> Got 550. Verifying existence..."
                  try {
                      # 尝试列出目录内容。如果能列出，说明目录存在，可以忽略错误。
                      Send-FtpRequest -Uri $DirUri -Method ([Net.WebRequestMethods+Ftp]::ListDirectory) | Out-Null
                      Write-Host " -> Verification Passed: Directory already exists."
                  } catch {
                      Write-Error "CRITICAL ERROR: Failed to create directory '$DirUri' AND failed to check its existence."
                      Write-Error "Possible causes:"
                      Write-Error "1. The parent directory does not exist. (Does '$basePath' exist?)"
                      Write-Error "2. Permissions denied."
                      exit 1
                  }
              } else {
                  if ($resp) { $resp.Close() }
                  Write-Error "Failed to create directory: $_"
                  exit 1
              }
          }
      }

      # === 3. 准备环境 ===
      
      # 尝试清理旧的 temp (如果有)
      try { 
          Write-Host "Cleaning cleanup old temp..."
          Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::RemoveDirectory) 
      } catch { } # 忽略清理错误

      # 【关键步骤】确保根临时目录存在
      # 这里会触发我们的智能检查。如果 aib 不存在，这里就会直接报错告诉你是 aib 没了
      Ensure-Directory -DirUri "$baseUri/$tempDirName"

      # === 4. 创建子目录结构 ===
      Write-Host "Creating sub-directories..."
      $directories = Get-ChildItem -Path $localDistPath -Recurse -Directory | Sort-Object { $_.FullName.Length }
      foreach ($dir in $directories) {
          $relativePath = $dir.FullName.Substring($localDistPath.Length).Replace('\', '/').Trim('/')
          if (-not [string]::IsNullOrWhiteSpace($relativePath)) {
              Ensure-Directory -DirUri "$baseUri/$tempDirName/$relativePath"
          }
      }

      # === 5. 上传文件 ===
      Write-Host "Uploading files..."
      $files = Get-ChildItem -Path $localDistPath -Recurse -File | Where-Object { $_.Extension -ne ".map" }
      foreach ($file in $files) {
          $relativePath = $file.FullName.Substring($localDistPath.Length).Replace('\', '/').Trim('/')
          $remoteUri = "$baseUri/$tempDirName/$relativePath"
          
          try {
              Send-FtpRequest -Uri $remoteUri -Method ([Net.WebRequestMethods+Ftp]::UploadFile) -IsUpload $true -FilePath $file.FullName | Out-Null
              Write-Host "Uploaded: $relativePath"
          } catch {
              Write-Error "Failed to upload $relativePath. URI: $remoteUri. Error: $_"
              exit 1
          }
      }

      # === 6. 上线 ===
      Write-Host "Going Live..."
      
      # 移除旧备份
      try { Send-FtpRequest -Uri "$baseUri/$backupDirName" -Method ([Net.WebRequestMethods+Ftp]::RemoveDirectory) } catch {}
      
      # 备份现网
      try { 
          Send-FtpRequest -Uri "$baseUri/$targetDirName" -Method ([Net.WebRequestMethods+Ftp]::Rename) -RenameTo $backupDirName 
      } catch {
          Write-Warning "Old website not found, nothing to backup."
      }
      
      # 启用新网
      try {
          Send-FtpRequest -Uri "$baseUri/$tempDirName" -Method ([Net.WebRequestMethods+Ftp]::Rename) -RenameTo $targetDirName | Out-Null
          Write-Host "DEPLOYMENT SUCCESSFUL!"
      } catch {
          Write-Error "Failed to activate new site: $_"
          exit 1
      }