stages: [build, deploy]

build-job:
  stage: build
  tags: [windows]
  script:
    - yarn install
    - yarn build
    - Rename-Item -Path "dist" -NewName "website"
  artifacts:
    paths: [website/]
    expire_in: 1 hour

deploy-job:
  stage: deploy
  tags: [windows]
  only: [main]
  before_script:
    - |
      if (-not $env:FTP_HOST -or -not $env:FTP_USER -or -not $env:FTP_PASS) {
        Write-Error "Missing FTP environment variables"
        exit 1
      }
  script:
    - |
      # ✅ 关键：FTP根路径就是用户主目录 /www/wwwroot/aib
      $cred = New-Object Net.NetworkCredential($env:FTP_USER,$env:FTP_PASS)
      $ftpRoot = "ftp://$($env:FTP_HOST)/"  # 用户chroot后，这里直接对应 /www/wwwroot/aib
      
      $tempDir = "website_temp"
      $targetDir = "website"
      
      # ✅ 创建临时目录（相对路径）
      try {
        $r = [Net.FtpWebRequest]::Create("$ftpRoot$tempDir")
        $r.Method = [Net.WebRequestMethods+Ftp]::MakeDirectory
        $r.Credentials = $cred
        $r.UsePassive = $true
        $r.GetResponse()
        Write-Host "Created temp directory"
      } catch {
        Write-Error "Failed to create temp directory: $_"
        exit 1
      }
      
      # ✅ 上传文件（相对路径）
      Get-ChildItem website -Recurse | Where-Object { $_.Extension -ne ".map" } | ForEach-Object {
        $relativePath = $_.FullName.Substring((Get-Item website).FullName.Length).Replace('\','/')
        $remotePath = "$ftpRoot$tempDir$relativePath"
        
        if ($_.PSIsContainer) {
          try {
            $r = [Net.FtpWebRequest]::Create($remotePath)
            $r.Method = [Net.WebRequestMethods+Ftp]::MakeDirectory
            $r.Credentials = $cred
            $r.UsePassive = $true
            $r.GetResponse()
            Write-Host "Created: $relativePath"
          } catch {
            Write-Error "Failed to create dir $relativePath : $_"
            exit 1
          }
        } else {
          if ($_.Length -eq 0) { return }
          try {
            $r = [Net.FtpWebRequest]::Create($remotePath)
            $r.Method = [Net.WebRequestMethods+Ftp]::UploadFile
            $r.Credentials = $cred
            $r.UsePassive = $true
            $bytes = [IO.File]::ReadAllBytes($_.FullName)
            $s = $r.GetRequestStream()
            $s.Write($bytes,0,$bytes.Length)
            $s.Close()
            $r.GetResponse()
            Write-Host "Uploaded: $relativePath ($($_.Length) bytes)"
          } catch {
            Write-Error "Failed to upload $relativePath : $_"
            exit 1
          }
        }
      }
      
      # ✅ 原子性替换
      try {
        $r = [Net.FtpWebRequest]::Create("$ftpRoot$targetDir")
        $r.Method = [Net.WebRequestMethods+Ftp]::RemoveDirectory
        $r.Credentials = $cred
        $r.UsePassive = $true
        $r.GetResponse()
        Write-Host "Removed old website directory"
      } catch {
        Write-Warning "Remove failed: $_"
      }
      
      try {
        $r = [Net.FtpWebRequest]::Create("$ftpRoot$tempDir")
        $r.Method = [Net.WebRequestMethods+Ftp]::Rename
        $r.Credentials = $cred
        $r.RenameTo = $targetDir
        $r.UsePassive = $true
        $r.GetResponse()
        Write-Host "✅ Deployed successfully"
      } catch {
        Write-Error "Rename failed: $_"
        exit 1
      }
      
      # ✅ 验证
      try {
        $r = [Net.FtpWebRequest]::Create("$ftpRoot$targetDir")
        $r.Method = [Net.WebRequestMethods+Ftp]::ListDirectory
        $r.Credentials = $cred
        $r.UsePassive = $true
        $response = $r.GetResponse()
        $reader = New-Object IO.StreamReader $response.GetResponseStream()
        Write-Host "Files:" $reader.ReadToEnd()
        $reader.Close(); $response.Close()
      } catch {
        Write-Error "Verify failed: $_"
        exit 1
      }