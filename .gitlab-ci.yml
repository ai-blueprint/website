stages:
  - install
  - build
  - deploy

variables:
  NODE_VERSION: '18.17.0'
  DEPLOY_PATH: '/www/wwwroot/aib/website'

install_dependencies:
  stage: install
  tags:
    - windows
  script:
    - yarn install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day

build_project:
  stage: build
  tags:
    - windows
  dependencies:
    - install_dependencies
  script:
    - yarn build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

deploy_to_server:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build_project
  script:
    - |
      # 使用PowerShell和WinSCP命令行工具上传文件
      # 确保runner已安装WinSCP
      $winscpPath = "C:\Program Files (x86)\WinSCP\WinSCP.com"
      if (-Not (Test-Path $winscpPath)) {
        $winscpPath = "C:\Program Files\WinSCP\WinSCP.com"
      }
      
      # 生成WinSCP脚本
      $scriptContent = @"
      open sftp://$env:USER:$env:PASSWORD@$env:HOST/ -hostkey=*
      option batch continue
      option confirm off
      mkdir -p $env:DEPLOY_PATH
      put -r ./dist/* $env:DEPLOY_PATH/
      close
      exit
      "@
      
      $scriptContent | Out-File -FilePath winscp_script.txt -Encoding utf8
      
      # 执行WinSCP脚本
      & "$winscpPath" /script=winscp_script.txt
      
      # 清理临时脚本
      Remove-Item -Path winscp_script.txt -Force
