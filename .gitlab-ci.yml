stages:
  - install
  - build
  - deploy

variables:
  NODE_VERSION: '18.17.0'
  DEPLOY_PATH: '/www/wwwroot/aib/website'

install_dependencies:
  stage: install
  tags:
    - windows
  script:
    - yarn install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day

build_project:
  stage: build
  tags:
    - windows
  dependencies:
    - install_dependencies
  script:
    - yarn build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

deploy_to_server:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build_project
  script:
    # 1. 配置SSH环境（Windows PowerShell语法）
    - $SSHDir = "$env:USERPROFILE\.ssh"
    - New-Item -ItemType Directory -Force -Path $SSHDir
    - echo "$env:SSH_PRIVATE_KEY" | Out-File -FilePath "$SSHDir\id_ed25519" -Encoding ascii
    - echo "$env:SSH_KNOWN_HOSTS" | Out-File -FilePath "$SSHDir\known_hosts" -Encoding ascii
    
    # 2. 设置文件权限（Windows下权限要求较宽松）
    - icacls "$SSHDir\id_ed25519" /inheritance:r /grant:r "$env:USERNAME`:F"
    
    # 或者使用sftp（更可靠）
    - echo "put -r dist/*" | sftp -i "$SSHDir\id_ed25519" "$env:DEPLOY_USER@$env:DEPLOY_SERVER`:$env:DEPLOY_PATH"
    
